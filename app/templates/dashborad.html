<!DOCTYPE html>
<html>
<head>
    <title>TradePulse Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            border-radius: 10px;
        }
        .buy { color: #22c55e; }
        .sell { color: #ef4444; }
        .hold { color: #facc15; }
    </style>
</head>
<body>

    <h1>📊 TradePulse Dashboard</h1>

    <div class="card">
        <h3>BTC-USD</h3>
        <p class="buy">BUY SIGNAL</p>
    </div>

    <div class="card">
        <h3>GOLD</h3>
        <p class="hold">NO TRADE</p>
    </div>

    <div class="card">
        <h3>EUR/USD</h3>
        <p class="sell">SELL SIGNAL</p>
    </div>

    <div class="card">
        <h3>GBP/USD</h3>
        <p class="hold">NO TRADE</p>
    </div>

</body>
</html>
